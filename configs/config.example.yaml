telegram:
  token: "YOUR_BOT_TOKEN_HERE"

database:
  path: "/var/lib/jaimito/jaimito.db"

server:
  # Listen address for the HTTP API (default: 127.0.0.1:8080)
  listen: "127.0.0.1:8080"

channels:
  - name: general
    chat_id: 100000001
    priority: normal

  - name: deploys
    chat_id: 100000002
    priority: normal

  - name: errors
    chat_id: 100000003
    priority: high

  - name: cron
    chat_id: 100000004
    priority: low

  - name: system
    chat_id: 100000005
    priority: normal

  - name: security
    chat_id: 100000006
    priority: high

  - name: monitoring
    chat_id: 100000007
    priority: normal

# Seed API keys — inserted on first startup, ignored if already present.
# Generate a key: openssl rand -hex 32 | sed 's/^/sk-/'
seed_api_keys:
  - name: "default"
    key: "sk-REPLACE_ME_WITH_A_REAL_KEY"
