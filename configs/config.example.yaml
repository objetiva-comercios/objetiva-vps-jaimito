telegram:
  token: "YOUR_BOT_TOKEN_HERE"

database:
  path: "/var/lib/jaimito/jaimito.db"

server:
  # Listen address for the HTTP API and dashboard (default: 127.0.0.1:8080)
  # Access the dashboard at http://127.0.0.1:8080/dashboard
  listen: "127.0.0.1:8080"

channels:
  - name: general
    chat_id: 100000001
    priority: normal

  - name: deploys
    chat_id: 100000002
    priority: normal

  - name: errors
    chat_id: 100000003
    priority: high

  - name: cron
    chat_id: 100000004
    priority: low

  - name: system
    chat_id: 100000005
    priority: normal

  - name: security
    chat_id: 100000006
    priority: high

  - name: monitoring
    chat_id: 100000007
    priority: normal

# Seed API keys — inserted on first startup, ignored if already present.
# Generate a key: openssl rand -hex 32 | sed 's/^/sk-/'
seed_api_keys:
  - name: "default"
    key: "sk-REPLACE_ME_WITH_A_REAL_KEY"

# Metrics collection (v2.0) — optional. Remove this section to disable metrics entirely.
# When enabled, jaimito collects metrics at regular intervals, stores them in SQLite,
# serves them via the REST API, and displays them in the dashboard at /dashboard.
# Threshold crossings trigger Telegram alerts to the 'monitoring' or 'general' channel.
#
# metrics:
#   retention: "7d"            # How long to keep readings (supports: s, m, h, d). Default: 7d.
#   alert_cooldown: "30m"      # Minimum time between repeated alerts for the same metric. Default: 30m.
#   collect_interval: "60s"    # Default collection interval for all metrics (overridden per-metric).
#   definitions:
