<body class="bg-slate-950 text-slate-100 font-mono min-h-screen" x-data="dashboard">

    <!-- Error banner -->
    <div x-show="error" class="bg-red-950 border-b border-red-800 p-3 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-400 flex-shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        <span class="text-xs text-red-400">No se pudo conectar con el servidor. Reintentando en 30 segundos.</span>
    </div>

    <!-- Header -->
    <div class="bg-slate-800 p-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></svg>
            <span class="text-sm font-semibold text-slate-100">{{HOSTNAME}}</span>
        </div>
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" :class="{ 'animate-spin': loading }" class="text-slate-500"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            <span class="text-xs text-slate-500">Actualizado: <span x-text="lastUpdated"></span></span>
        </div>
    </div>

    <!-- Main content -->
    <div class="p-4">
        <table class="w-full" x-show="!loading && metrics.length > 0">
            <thead>
                <tr class="border-b border-slate-700">
                    <th class="text-xs text-slate-500 uppercase tracking-wider text-left py-2 px-3">Métrica</th>
                    <th class="text-xs text-slate-500 uppercase tracking-wider text-left py-2 px-3">Valor</th>
                    <th class="text-xs text-slate-500 uppercase tracking-wider text-left py-2 px-3">Tendencia</th>
                    <th class="text-xs text-slate-500 uppercase tracking-wider text-left py-2 px-3">Estado</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="metric in metrics" :key="metric.name">
                    <!-- Data row -->
                    <tr
                        @click="toggleMetric(metric.name, metric.thresholds)"
                        class="border-b border-slate-700 cursor-pointer transition-colors duration-150 hover:bg-slate-800"
                        :class="{ 'bg-slate-800 border-l-2 border-blue-500': openMetric === metric.name }"
                    >
                        <td class="py-3 px-3">
                            <span class="text-sm font-semibold text-slate-100" x-text="metric.name"></span>
                        </td>
                        <td class="py-3 px-3">
                            <div>
                                <span class="text-base font-semibold" x-text="metric.last_value !== null ? metric.last_value : '—'"></span>
                                <div class="text-xs text-slate-500" x-text="metric.updated_at ? new Date(metric.updated_at).toLocaleTimeString('es-AR', {hour12: false}) : ''"></div>
                            </div>
                        </td>
                        <td class="py-3 px-3">
                            <svg width="80" height="24" viewBox="0 0 80 24" x-show="sparklinePoints(metric.name) !== ''">
                                <polyline :points="sparklinePoints(metric.name)" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
                            </svg>
                            <span x-show="sparklinePoints(metric.name) === ''" class="text-xs text-slate-600">—</span>
                        </td>
                        <td class="py-3 px-3">
                            <div class="flex items-center gap-1.5">
                                <span
                                    class="inline-block w-2 h-2 rounded-full"
                                    :class="{
                                        'bg-green-500': metric.last_status === 'ok',
                                        'bg-yellow-500': metric.last_status === 'warning',
                                        'bg-red-500 animate-pulse': metric.last_status === 'critical'
                                    }"
                                ></span>
                                <span
                                    class="text-xs"
                                    :class="{
                                        'text-green-500': metric.last_status === 'ok',
                                        'text-yellow-500': metric.last_status === 'warning',
                                        'text-red-500': metric.last_status === 'critical'
                                    }"
                                    x-text="metric.last_status || 'ok'"
                                ></span>
                            </div>
                        </td>
                    </tr>
                    <!-- Expanded chart row -->
                    <tr x-show="openMetric === metric.name" x-transition>
                        <td colspan="4" class="bg-slate-800 p-4">
                            <div
                                :id="'chart-' + metric.name"
                                class="min-h-[200px] md:min-h-[300px] w-full"
                                style="min-height: 200px;"
                            ></div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>

        <!-- Loading skeleton -->
        <table class="w-full" x-show="loading">
            <tbody>
                <tr class="border-b border-slate-700">
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-32"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-16"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-20"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-12"></div></td>
                </tr>
                <tr class="border-b border-slate-700">
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-28"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-16"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-20"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-12"></div></td>
                </tr>
                <tr class="border-b border-slate-700">
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-36"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-16"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-20"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-12"></div></td>
                </tr>
                <tr class="border-b border-slate-700">
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-24"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-16"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-20"></div></td>
                    <td class="py-3 px-3"><div class="animate-pulse bg-slate-700 h-4 rounded w-12"></div></td>
                </tr>
            </tbody>
        </table>

        <!-- Empty state -->
        <div x-show="!loading && metrics.length === 0" class="flex flex-col items-center justify-center py-16 gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-600"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
            <p class="text-sm font-semibold text-slate-400">Sin métricas configuradas</p>
            <p class="text-xs text-slate-500">Agregá métricas en config.yaml para comenzar a recolectar datos.</p>
        </div>
    </div>

    <!-- uPlot IIFE — must be FIRST script so window.uPlot is defined before Alpine -->

    <script>
function makeThresholdPlugin(thresholds) {
    return {
        hooks: {
            draw: [function(u) {
                const { ctx } = u;
                const { left, top, width } = u.bbox;

                if (thresholds && thresholds.warning != null) {
                    const cy = Math.round(u.valToPos(thresholds.warning, 'y', true));
                    ctx.save();
                    ctx.strokeStyle = '#eab308';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.moveTo(left, cy);
                    ctx.lineTo(left + width, cy);
                    ctx.stroke();
                    ctx.restore();
                }

                if (thresholds && thresholds.critical != null) {
                    const cy = Math.round(u.valToPos(thresholds.critical, 'y', true));
                    ctx.save();
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.moveTo(left, cy);
                    ctx.lineTo(left + width, cy);
                    ctx.stroke();
                    ctx.restore();
                }
            }]
        }
    };
}

document.addEventListener('alpine:init', () => {
    Alpine.data('dashboard', () => ({
        metrics: [],
        loading: true,
        error: false,
        lastUpdated: '',
        openMetric: null,
        sparkData: {},
        _pollingTimer: null,
        _chartInstance: null,

        async init() {
            await this.fetchMetrics();
            this._pollingTimer = setInterval(() => this.fetchMetrics(), 30000);
        },

        destroy() {
            if (this._pollingTimer) clearInterval(this._pollingTimer);
            if (this._chartInstance) { this._chartInstance.destroy(); this._chartInstance = null; }
        },

        async fetchMetrics() {
            try {
                const resp = await fetch('/api/v1/metrics');
                if (!resp.ok) throw new Error('fetch failed');
                this.metrics = await resp.json();
                this.error = false;
                this.lastUpdated = new Date().toLocaleTimeString('es-AR', {hour12: false});
                // Acumular sparkData: por cada metrica, pushear last_value al array acumulador
                for (const metric of this.metrics) {
                    if (metric.last_value !== null && metric.last_value !== undefined) {
                        if (!this.sparkData[metric.name]) {
                            this.sparkData[metric.name] = [];
                        }
                        this.sparkData[metric.name].push(metric.last_value);
                        // Truncar a los ultimos 20 elementos
                        if (this.sparkData[metric.name].length > 20) {
                            this.sparkData[metric.name] = this.sparkData[metric.name].slice(-20);
                        }
                    }
                }
            } catch(e) {
                this.error = true;
            } finally {
                this.loading = false;
            }
        },

        async toggleMetric(name, thresholds) {
            if (this.openMetric === name) {
                // Colapsar
                this.openMetric = null;
                if (this._chartInstance) { this._chartInstance.destroy(); this._chartInstance = null; }
                return;
            }
            // Destruir grafico anterior si existe
            if (this._chartInstance) { this._chartInstance.destroy(); this._chartInstance = null; }
            this.openMetric = name;

            try {
                const resp = await fetch(`/api/v1/metrics/${name}/readings?since=24h`);
                if (!resp.ok) throw new Error('readings fetch failed');
                const data = await resp.json();
                this.$nextTick(() => this.renderChart(name, data.readings, thresholds));
            } catch(e) {
                console.error('Error fetching readings:', e);
            }
        },

        renderChart(name, readings, thresholds) {
            const el = document.getElementById(`chart-${name}`);
            if (!el) return;
            // Guard: uPlot requiere al menos 2 puntos (Pitfall 2)
            if (!readings || readings.length < 2) {
                el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#64748b;font-size:12px;">Sin datos suficientes para mostrar el gráfico</div>';
                return;
            }

            const xs = readings.map(r => Math.floor(new Date(r.recorded_at).getTime() / 1000));
            const ys = readings.map(r => r.value);

            const opts = {
                width: el.clientWidth || 800,
                height: 250,
                series: [
                    {},
                    {
                        stroke: '#3b82f6',
                        width: 2,
                        fill: 'rgba(59,130,246,0.05)',
                    }
                ],
                axes: [
                    {
                        stroke: '#64748b',
                        ticks: { stroke: '#334155' },
                        grid: { stroke: '#334155' },
                    },
                    {
                        stroke: '#64748b',
                        ticks: { stroke: '#334155' },
                        grid: { stroke: '#334155' },
                    },
                ],
                plugins: thresholds ? [makeThresholdPlugin(thresholds)] : [],
            };
            this._chartInstance = new uPlot(opts, [xs, ys], el);
        },

        sparklinePoints(name) {
            const vals = this.sparkData[name];
            if (!vals || vals.length < 2) return '';
            const min = Math.min(...vals);
            const max = Math.max(...vals);
            const range = max - min || 1;
            return vals.map((v, i) => {
                const x = (i / (vals.length - 1)) * 80;
                const y = 22 - ((v - min) / range) * 20;
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            }).join(' ');
        },
    }));
});
    </script>
